name: CI
on:
  push:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run type-check
      - name: Lint check
        run: bun run lint
      - name: Format check
        run: bun run format:check
      # NOTE: When adding a production build step for the extension, use
      # `bun run build` (apps/extension). Never use `build:test` in CI/release —
      # that variant injects http://localhost/* into the manifest via PLAYWRIGHT=true.
